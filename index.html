<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* PREMIUM STYLE */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background: radial-gradient(circle at top left, #001f3f, #000b18);
            height: 100vh; width: 100vw; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        .background-blobs { position: absolute; width: 100%; height: 100%; z-index: -1; filter: blur(100px); }
        .blob { position: absolute; width: 400px; height: 400px; border-radius: 50%; opacity: 0.3; animation: drift 10s infinite alternate; }
        .blue { background: #0074d9; top: 0; left: 0; }
        .cyan { background: #00d4ff; bottom: 0; right: 0; }
        @keyframes drift { from { transform: translate(0,0); } to { transform: translate(30px, 50px); } }

        /* GLASS BOX */
        .glass-box {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px;
            width: 90%; max-width: 380px; padding: 45px 30px; color: white; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); display: none; animation: in 0.5s ease;
        }
        .active { display: block; }
        @keyframes in { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        h2 { font-weight: 700; margin-bottom: 30px; letter-spacing: -0.5px; }
        select, input {
            width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05);
            color: white; outline: none; font-size: 15px;
        }
        select option { background: #001f3f; }

        /* PROGRESS BAR */
        #p-container { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 5px; margin-bottom: 20px; display: none; overflow: hidden; }
        #p-bar { width: 40%; height: 100%; background: #00d4ff; box-shadow: 0 0 10px #00d4ff; animation: move 1s infinite ease-in-out; }
        @keyframes move { from { transform: translateX(-150%); } to { transform: translateX(350%); } }

        button {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: #fff; color: #000; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.2); }
        .err { color: #ff5252; font-size: 13px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

    <div class="background-blobs">
        <div class="blob blue"></div>
        <div class="blob cyan"></div>
    </div>

    <!-- LOGIN PAGE -->
    <div id="login" class="glass-box active">
        <h2>PORTAL LOGIN</h2>
        <p id="error" class="err">Invalid Credentials!</p>
        
        <select id="userSelect">
            <option value="" disabled selected>Select User Name</option>
            <option value="Gilgal">Gilgal</option>
            <option value="James">James</option>
            <option value="Mark">Mark</option>
            <option value="Luke">Luke</option>
            <option value="John">John</option>
            <option value="Mary">Mary</option>
            <option value="Ruth">Ruth</option>
        </select>

        <input type="password" id="pass" placeholder="Password (local code)">

        <div id="p-container"><div id="p-bar"></div></div>
        <button id="btn" onclick="checkAuth()">LOGIN NOW</button>
    </div>

    <!-- SUCCESS PAGE -->
    <div id="success" class="glass-box">
        <h2 id="msg">Verified!</h2>
        <p style="opacity: 0.7; margin-bottom: 25px;">Database check in process successfully.</p>
        <button style="background: rgba(255,255,255,0.1); color: #fff;" onclick="location.reload()">LOGOUT</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxA_YOAvqZT-sV2YGZrAWyTqngd73acryZJmCVa_GDAdSfgbLH4FX3ExYvyh3Q5Ow/exec";

        // 1. DATA HARDCODED (Local Login Storage)
        const accounts = {
            "Gilgal": { p: "1111", m: "gilgal@example.com" },
            "James":  { p: "2222", m: "james@example.com" },
            "Mark":   { p: "3333", m: "mark@example.com" },
            "Luke":   { p: "4444", m: "luke@example.com" },
            "John":   { p: "5555", m: "john@example.com" },
            "Mary":   { p: "6666", m: "mary@example.com" },
            "Ruth":   { p: "7777", m: "ruth@example.com" }
        };

        async function checkAuth() {
            const u = document.getElementById('userSelect').value;
            const p = document.getElementById('pass').value;
            const err = document.getElementById('error');
            const prog = document.getElementById('p-container');
            const btn = document.getElementById('btn');

            if (accounts[u] && accounts[u].p === p) {
                // SUCCESS
                err.style.display = "none";
                prog.style.display = "block"; // PROGRESS BAR SHOW
                btn.innerText = "Syncing...";
                btn.disabled = true;

                try {
                    // Store to Google Sheet only after local login is correct
                    await fetch(SCRIPT_URL, {
                        method: "POST",
                        body: JSON.stringify({ action: "login", username: u, gmail: accounts[u].m })
                    });

                    document.getElementById('msg').innerText = "Vanhnem " + u + "!";
                    show('success');
                } catch (e) {
                    alert("Logged in but Database failed to Sync.");
                }
            } else {
                err.style.display = "block";
            }
        }

        function show(id) {
            document.querySelectorAll('.glass-box').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
