<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#dff5ff,#8fd3ff);
overflow:hidden;
}

.card{
width:90%;
max-width:400px;
padding:35px;
border-radius:30px;
background:rgba(255,255,255,.2);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.3);
box-shadow:0 8px 32px rgba(0,0,0,.15);
animation:show .8s ease;
}

@keyframes show{
from{
transform:translateY(50px);
opacity:0;
}
to{
transform:translateY(0);
opacity:1;
}
}

h1{
text-align:center;
margin-bottom:30px;
color:#006699;
}

select,input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
outline:none;
border-radius:20px;
font-size:16px;
background:rgba(255,255,255,.4);
}

button{
width:100%;
padding:15px;
border:none;
border-radius:20px;
background:#00aaff;
color:white;
font-size:18px;
cursor:pointer;
transition:.2s;
}

button:active{
transform:scale(.95);
}

.progress-container{
margin-top:20px;
height:8px;
background:#dcefff;
border-radius:50px;
overflow:hidden;
display:none;
}

.progress{
height:100%;
width:0%;
background:#0099ff;
transition:.3s;
}

#msg{
margin-top:20px;
text-align:center;
font-weight:bold;
font-size:18px;
}

.success{
color:green;
animation:blink .8s infinite;
}

.error{
color:red;
}

@keyframes blink{
50%{
opacity:.5;
}
}
</style>
</head>
<body>

<div class="card">

<h1>Login</h1>

<select id="username">
<option value="">Select User</option>
<option>Aron</option>
<option>Browny</option>
<option>Charlie</option>
<option>Daina</option>
<option>Fiona</option>
<option>Gerad</option>
<option>Herald</option>
</select>

<input type="password" id="password" placeholder="Password">

<button onclick="login()">
Login
</button>

<div class="progress-container" id="box">
<div class="progress" id="progress"></div>
</div>

<div id="msg"></div>

</div>

<script>

const WEBAPP="https://script.google.com/macros/s/AKfycby_ImUA3MwjvIC3VZZozC6CC4Udesq02m5yWaug51_GpkgM9xevibdpY8-aCs3OoFnW/exec";

const users={
Aron:"1111",
Browny:"2222",
Charlie:"3333",
Daina:"4444",
Fiona:"5555",
Gerad:"6666",
Herald:"7777"
};

function login(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;
let msg=document.getElementById("msg");

if(username==""){
msg.innerHTML="Select Username";
msg.className="error";
return;
}

if(users[username]!=password){
msg.innerHTML="Wrong Password";
msg.className="error";
return;
}

document.getElementById("box").style.display="block";

let p=0;

let timer=setInterval(()=>{

p+=5;

document.getElementById("progress").style.width=p+"%";

if(p>=100){

clearInterval(timer);

let now=new Date().toLocaleString();

fetch(WEBAPP,{
method:"POST",
body:JSON.stringify({
action:"login",
local:username,
password:password,
lastlogin:now
})
})
.then(res=>res.text())
.then(data=>{

msg.innerHTML="✔ Login Success";
msg.className="success";

})
.catch(err=>{
msg.innerHTML="Connection Error";
msg.className="error";
});

}

},40);

}

</script>

</body>
</html>
